<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Voltrix - Simulación de Energía</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e293b;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            margin-top: 50px;
        }

        button {
            padding: 12px 25px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2563eb;
        }

        #consumo {
            font-size: 24px;
            margin: 20px 0;
        }

        .barra {
            width: 300px;
            height: 20px;
            background: #334155;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .nivel {
            height: 100%;
            width: 0%;
            background: green;
            transition: width 0.5s;
        }
    </style>
</head>

<body>

    <header>
        <h1>Voltrix ⚡</h1>
        <p>Simulación de consumo energético</p>
    </header>

    <div class="container">
        <h2>Simulación interactiva</h2>

        <p id="consumo">Consumo actual: 0 W</p>

        <div class="barra">
            <div id="nivel" class="nivel"></div>
        </div>

        <button onclick="simularConsumo()">Simular consumo</button>
    </div>

    <script>
        function simularConsumo() {
            let consumo = Math.floor(Math.random() * 500) + 50;

            let texto = document.getElementById("consumo");
            let barra = document.getElementById("nivel");

            texto.innerText = "Consumo actual: " + consumo + " W";

            let porcentaje = (consumo / 550) * 100;
            barra.style.width = porcentaje + "%";

            if (consumo > 350) {
                texto.style.color = "red";
                barra.style.background = "red";
            } else if (consumo > 200) {
                texto.style.color = "orange";
                barra.style.background = "orange";
            } else {
                texto.style.color = "lightgreen";
                barra.style.background = "lightgreen";
            }
        }
    </script>

</body>
</html>
